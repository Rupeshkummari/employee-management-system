{% extends 'base.html' %}
{% load static %}

{% block title %}Login - EMS{% endblock %}

{% block login_content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <i class="fa-solid fa-users-gear"></i>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to access the Employee Management System</p>
        
        <!-- Alerts for Login -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade-in" style="font-size: 0.9rem; padding: 10px;">
                    <span>{{ message }}</span>
                    <button type="button" class="close-btn" onclick="this.parentElement.style.display='none';">&times;</button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 15px; top: 12px; color: var(--text-muted);"></i>
                    <input type="text" id="username" name="username" class="form-control" style="padding-left: 45px;" required placeholder="Enter username" autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 12px; color: var(--text-muted);"></i>
                    <input type="password" id="password" name="password" class="form-control" style="padding-left: 45px;" required placeholder="Enter password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1.05rem; margin-top: 10px;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
