{% extends 'base.html' %}
{% load static %}

{% block title %}{{ action }} Department - EMS{% endblock %}
{% block page_title %}{{ action }} Department{% endblock %}

{% block content %}
<div class="card fade-in" style="max-width: 600px; margin: 0 auto;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3><i class="fa-solid fa-building text-primary"></i> Department Information</h3>
        <a href="{% url 'department_list' %}" class="btn btn-sm btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>
    <hr style="border:0; border-top:1px solid var(--border-color); margin-bottom:24px;">

    <form method="POST" class="needs-validation">
        {% csrf_token %}
        <div class="form-group">
            <label for="name" class="form-label">Department Name <span class="text-danger">*</span></label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g. Engineering, HR, Finance">
        </div>
        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-control" rows="4" placeholder="Brief description of this department..."></textarea>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
            <a href="{% url 'department_list' %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Save Department</button>
        </div>
    </form>
</div>
{% endblock %}
